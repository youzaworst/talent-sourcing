<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --surface2: #1a1e27;
    --border: #252a36;
    --accent: #5b8def;
    --accent2: #3ecfb2;
    --text: #e4e8f0;
    --muted: #7a8499;
    --tag-bg: #1e2a40;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1.1rem 0;
    margin-right: 2rem;
  }
  .nav-tab {
    padding: 1.1rem 1.4rem;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    user-select: none;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* LAYOUT */
  .page { display: none; padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; }

  /* SEARCH */
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.55rem 1rem;
    margin-bottom: 1.5rem;
    gap: 0.6rem;
  }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.95rem;
    flex: 1;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 1rem; }

  /* PAPER CARDS */
  .paper-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.75rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .paper-card:hover { border-color: #353d50; }
  .paper-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    cursor: pointer;
    gap: 1rem;
    user-select: none;
  }
  .paper-header:hover { background: var(--surface2); }
  .paper-title-wrap { flex: 1; min-width: 0; }
  .paper-title {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
  }
  .paper-meta {
    display: flex;
    gap: 1rem;
    margin-top: 0.3rem;
    flex-wrap: wrap;
  }
  .paper-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }
  .author-count {
    font-size: 0.72rem;
    color: var(--accent2);
    font-weight: 500;
  }
  .chevron {
    color: var(--muted);
    font-size: 0.9rem;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .paper-card.open .chevron { transform: rotate(180deg); }

  /* PAPER BODY */
  .paper-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
  }
  .paper-card.open .paper-body { display: block; }
  .paper-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    margin-bottom: 1rem;
  }
  .paper-link:hover { text-decoration: underline; }
  .authors-grid {
    display: grid;
    gap: 0.5rem;
  }

  /* AUTHOR ROW inside paper */
  .author-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .author-row-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.9rem;
    cursor: pointer;
    gap: 0.75rem;
    user-select: none;
  }
  .author-row-header:hover { background: #1f2330; }
  .author-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
  }
  .author-affil {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }
  .author-chevron {
    color: var(--muted);
    font-size: 0.75rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .author-row.open .author-chevron { transform: rotate(180deg); }
  .author-detail {
    display: none;
    padding: 0.75rem 0.9rem;
    border-top: 1px solid var(--border);
    gap: 0.6rem;
    flex-direction: column;
  }
  .author-row.open .author-detail { display: flex; }
  .detail-row { display: flex; gap: 0.5rem; align-items: flex-start; }
  .detail-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    min-width: 130px;
    padding-top: 0.1rem;
    flex-shrink: 0;
  }
  .detail-value {
    font-size: 0.8rem;
    color: var(--text);
    line-height: 1.5;
  }
  .tag-list { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .tag {
    background: var(--tag-bg);
    color: var(--accent);
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .none-val { color: var(--muted); font-style: italic; }

  /* AUTHORS PAGE */
  .authors-grid-page {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.65rem;
  }

  .author-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .author-card:hover { border-color: #353d50; }
  .author-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1rem;
    cursor: pointer;
    user-select: none;
    gap: 0.5rem;
  }
  .author-card-header:hover { background: var(--surface2); }
  .author-card-name {
    font-size: 0.9rem;
    font-weight: 500;
  }
  .author-card-affil {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.2rem;
    line-height: 1.3;
  }
  .author-card.open .author-chevron { transform: rotate(180deg); }
  .author-card-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0.85rem 1rem;
    flex-direction: column;
    gap: 0.6rem;
  }
  .author-card.open .author-card-detail { display: flex; }

  .papers-in-author { margin-top: 0.5rem; }
  .papers-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.35rem;
  }
  .author-paper-link {
    display: block;
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    line-height: 1.5;
    margin-bottom: 0.2rem;
  }
  .author-paper-link:hover { text-decoration: underline; }

  /* COUNT BADGE */
  .count-badge {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    margin-left: 0.5rem;
  }

  /* HEADING */
  .page-heading {
    margin-bottom: 1.5rem;
  }
  .page-heading h2 {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
  }
  .page-heading p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  /* SCROLL RESTORE */
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">⬡ Research Explorer</div>
  <div class="nav-tab active" onclick="switchTab('papers')">Papers</div>
  <div class="nav-tab" onclick="switchTab('authors')">Authors</div>
</nav>

<!-- PAPERS PAGE -->
<div class="page active" id="page-papers">
  <div class="page-heading">
    <h2>Papers <span class="count-badge" id="paper-count">0</span></h2>
    <p>Browse papers and expand to see authors and their details.</p>
  </div>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="paper-search" placeholder="Search papers…" oninput="filterPapers(this.value)">
  </div>
  <div id="papers-list"></div>
</div>

<!-- AUTHORS PAGE -->
<div class="page" id="page-authors">
  <div class="page-heading">
    <h2>Authors <span class="count-badge" id="author-count">0</span></h2>
    <p>Unique authors across all papers. Click any card to expand full details.</p>
  </div>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="author-search" placeholder="Search authors…" oninput="filterAuthors(this.value)">
  </div>
  <div class="authors-grid-page" id="authors-grid"></div>
</div>

function val(v) {
  if (!v || v === 'None' || v === 'Unknown' || v.toLowerCase() === 'none' || v.toLowerCase() === 'unknown') return null;
  return v;
}

function renderTag(v) {
  if (!val(v)) return '<span class="none-val">—</span>';
  const parts = v.split(/[,;]+/).map(s => s.trim()).filter(Boolean);
  return '<div class="tag-list">' + parts.map(p => `<span class="tag">${esc(p)}</span>`).join('') + '</div>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function detailRow(label, value, tags=false) {
  const display = tags ? renderTag(value) : (val(value) ? `<span class="detail-value">${esc(val(value))}</span>` : '<span class="none-val detail-value">—</span>');
  return `<div class="detail-row"><span class="detail-label">${label}</span>${display}</div>`;
}

// ---- PAPERS ----
const papers = RAW.papers;
document.getElementById('paper-count').textContent = papers.length;

function renderAuthorRow(author) {
  return `<div class="author-row">
    <div class="author-row-header" onclick="toggleAuthor(this)">
      <div>
        <div class="author-name">${esc(author.name)}</div>
        ${val(author.affiliation) ? `<div class="author-affil">${esc(author.affiliation)}</div>` : ''}
      </div>
      <span class="author-chevron">▼</span>
    </div>
    <div class="author-detail">
      ${detailRow('Affiliation', author.affiliation)}
      ${detailRow('Education', author.education)}
      ${detailRow('Expertise', author.areas_of_expertise, true)}
      ${detailRow('Notable Work', author.notable_work)}
      ${detailRow('Previous Orgs', author.previous_companies)}
    </div>
  </div>`;
}

function renderPaperCard(paper) {
  const dateStr = paper.date ? paper.date.slice(0,10) : '';
  const authorsHtml = paper.authors.map(renderAuthorRow).join('');
  return `<div class="paper-card">
    <div class="paper-header" onclick="togglePaper(this)">
      <div class="paper-title-wrap">
        <div class="paper-title">${esc(paper.title)}</div>
        <div class="paper-meta">
          ${dateStr ? `<span class="paper-date">${dateStr}</span>` : ''}
          <span class="author-count">${paper.authors.length} author${paper.authors.length !== 1 ? 's' : ''}</span>
        </div>
      </div>
      <span class="chevron">▼</span>
    </div>
    <div class="paper-body">
      <a class="paper-link" href="${esc(paper.link)}" target="_blank" rel="noopener">↗ arxiv link</a>
      <div class="authors-grid">${authorsHtml}</div>
    </div>
  </div>`;
}

const papersList = document.getElementById('papers-list');
function renderPapers(list) {
  papersList.innerHTML = list.map(renderPaperCard).join('');
  document.getElementById('paper-count').textContent = list.length;
}
renderPapers(papers);

function filterPapers(q) {
  q = q.toLowerCase();
  const filtered = q ? papers.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.authors.some(a => a.name.toLowerCase().includes(q) || (a.affiliation||'').toLowerCase().includes(q))
  ) : papers;
  renderPapers(filtered);
}

function togglePaper(el) {
  const card = el.closest('.paper-card');
  card.classList.toggle('open');
}
function toggleAuthor(el) {
  const row = el.closest('.author-row, .author-card');
  row.classList.toggle('open');
}

// ---- AUTHORS ----
const authors = RAW.authors.sort((a,b) => a.name.localeCompare(b.name));
document.getElementById('author-count').textContent = authors.length;

function renderAuthorCard(author) {
  const papersHtml = author.papers.map(p =>
    `<a class="author-paper-link" href="${esc(p.link)}" target="_blank" rel="noopener">↗ ${esc(p.title)}</a>`
  ).join('');
  return `<div class="author-card">
    <div class="author-card-header" onclick="toggleAuthor(this)">
      <div>
        <div class="author-card-name">${esc(author.name)}</div>
        ${val(author.affiliation) ? `<div class="author-card-affil">${esc(author.affiliation)}</div>` : ''}
      </div>
      <span class="author-chevron">▼</span>
    </div>
    <div class="author-card-detail">
      ${detailRow('Education', author.education)}
      ${detailRow('Expertise', author.areas_of_expertise, true)}
      ${detailRow('Notable Work', author.notable_work)}
      ${detailRow('Previous Orgs', author.previous_companies)}
      <div class="papers-in-author">
        <div class="papers-label">Papers (${author.papers.length})</div>
        ${papersHtml}
      </div>
    </div>
  </div>`;
}

const authorsGrid = document.getElementById('authors-grid');
function renderAuthors(list) {
  authorsGrid.innerHTML = list.map(renderAuthorCard).join('');
  document.getElementById('author-count').textContent = list.length;
}
renderAuthors(authors);

function filterAuthors(q) {
  q = q.toLowerCase();
  const filtered = q ? authors.filter(a =>
    a.name.toLowerCase().includes(q) ||
    (a.affiliation||'').toLowerCase().includes(q) ||
    (a.areas_of_expertise||'').toLowerCase().includes(q) ||
    a.papers.some(p => p.title.toLowerCase().includes(q))
  ) : authors;
  renderAuthors(filtered);
}

// ---- TABS ----
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', ['papers','authors'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
}
</script>
